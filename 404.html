<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found · Root Crate</title>
  <link rel="icon" type="image/png" href="img/favicon-128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5ecd9;
      --terracotta: #c75d3a;
      --terracotta-deep: #a44627;
      --ink: #2a1f17;
      --ink-soft: #5a4838;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--cream);
      color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      font-weight: 300;
      padding: 2rem;
      text-align: center;
    }
    .mark {
      width: 72px; height: 72px;
      display: grid; place-items: center;
      margin: 0 auto 1.5rem;
    }
    .mark img { width: 100%; height: 100%; object-fit: contain; }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 500;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      margin: 0 0 0.5rem;
    }
    h1 em { color: var(--terracotta); font-weight: 500; }
    p { color: var(--ink-soft); max-width: 32rem; font-size: 1.05rem; margin: 0 auto 1.5rem; }
    a {
      color: var(--terracotta-deep);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark"><img src="img/logo-mark.png" alt="Root Crate" /></div>
    <h1>This page is <em>not in the crate.</em></h1>
    <p>The page you're looking for doesn't exist, or hasn't been packed yet.</p>
    <a href="/">Back to Root Crate</a>
  </main>
</body>
</html>
